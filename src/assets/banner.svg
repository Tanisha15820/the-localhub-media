<svg width="100%" viewBox="0 0 1440 700" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Main background: rich dark terracotta, NO black — darkest is #1E0A04 -->
    <radialGradient id="bgGlow" cx="62%" cy="48%" r="55%">
      <stop offset="0%"   stop-color="#C04830"/>
      <stop offset="35%"  stop-color="#8B2810"/>
      <stop offset="70%"  stop-color="#5A1A08"/>
      <stop offset="100%" stop-color="#2E0D04"/>
    </radialGradient>

    <!-- Subtle warm vignette overlay -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#D97757" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1E0A04" stop-opacity="0.55"/>
    </radialGradient>

    <!-- Sun core glow -->
    <radialGradient id="sunCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFE8B0"/>
      <stop offset="40%"  stop-color="#F5A050"/>
      <stop offset="100%" stop-color="#D97757" stop-opacity="0"/>
    </radialGradient>

    <!-- Sun halo -->
    <radialGradient id="sunHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#E8843A" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#C04830" stop-opacity="0"/>
    </radialGradient>

    <!-- Horizon warm band -->
    <linearGradient id="horizonGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#D97757" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#C04830" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8B2810" stop-opacity="0"/>
    </linearGradient>

    <!-- Ground gradient — rich dark rust, NO black -->
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#6B1E08"/>
      <stop offset="100%" stop-color="#2E0D04"/>
    </linearGradient>

    <!-- Building silhouettes — dark but warm rust, never black -->
    <linearGradient id="buildingGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4A1408"/>
      <stop offset="100%" stop-color="#2A0C04"/>
    </linearGradient>

    <!-- Top corner fade — dark warm, NO black -->
    <radialGradient id="topLeftFade" cx="0%" cy="0%" r="60%">
      <stop offset="0%"   stop-color="#2E0D04" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#2E0D04" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="topRightFade" cx="100%" cy="0%" r="50%">
      <stop offset="0%"   stop-color="#2E0D04" stop-opacity="0.60"/>
      <stop offset="100%" stop-color="#2E0D04" stop-opacity="0"/>
    </radialGradient>

    <!-- Window glow filter -->
    <filter id="winGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Star glow -->
    <filter id="starGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Sun blur glow -->
    <filter id="sunBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

  </defs>

  <!-- ══ BACKGROUND ══ -->
  <rect width="1440" height="700" fill="url(#bgGlow)"/>

  <!-- Top-left corner warm-dark fade (replaces harsh black) -->
  <rect width="1440" height="700" fill="url(#topLeftFade)"/>
  <rect width="1440" height="700" fill="url(#topRightFade)"/>

  <!-- Horizon warm band -->
  <rect x="0" y="260" width="1440" height="200" fill="url(#horizonGlow)"/>

  <!-- ══ SUN — positioned right-center ══ -->
  <!-- Outer halo glow (blurred) -->
  <circle cx="920" cy="340" r="200" fill="url(#sunHalo)" filter="url(#sunBlur)"/>
  <!-- Mid glow ring -->
  <circle cx="920" cy="340" r="130" fill="#D06030" opacity="0.18"/>
  <!-- Sun body glow (blurred) -->
  <circle cx="920" cy="340" r="90"  fill="#E8803A" opacity="0.25" filter="url(#sunBlur)"/>
  <!-- Sun core -->
  <circle cx="920" cy="340" r="72"  fill="url(#sunCore)"/>
  <circle cx="920" cy="340" r="48"  fill="#FFD898" opacity="0.90"/>
  <circle cx="920" cy="340" r="28"  fill="#FFF0C0" opacity="0.95"/>

  <!-- Concentric ring accents -->
  <circle cx="920" cy="340" r="100" fill="none" stroke="#D97757" stroke-width="0.8" opacity="0.30"/>
  <circle cx="920" cy="340" r="140" fill="none" stroke="#C04830" stroke-width="0.6" opacity="0.20"/>
  <circle cx="920" cy="340" r="185" fill="none" stroke="#A83018" stroke-width="0.5" opacity="0.15"/>
  <circle cx="920" cy="340" r="235" fill="none" stroke="#8B2810" stroke-width="0.4" opacity="0.12"/>

  <!-- ══ ATMOSPHERIC HAZE LAYERS ══ -->
  <!-- Mid haze band (warm dusty glow across horizon) -->
  <ellipse cx="720" cy="400" rx="800" ry="60" fill="#C04830" opacity="0.12"/>
  <ellipse cx="720" cy="420" rx="700" ry="40" fill="#D97757" opacity="0.08"/>

  <!-- ══ POWER / CABLE LINES ══ -->
  <line x1="0"    y1="390" x2="1440" y2="395" stroke="#8B2810" stroke-width="0.9" opacity="0.50"/>
  <line x1="0"    y1="402" x2="1440" y2="406" stroke="#7A2008" stroke-width="0.6" opacity="0.35"/>
  <line x1="0"    y1="414" x2="1440" y2="416" stroke="#7A2008" stroke-width="0.5" opacity="0.25"/>
  <!-- Diagonal cables converging toward sun -->
  <line x1="200"  y1="500" x2="920"  y2="340" stroke="#6B1A06" stroke-width="0.7" opacity="0.30"/>
  <line x1="400"  y1="510" x2="920"  y2="340" stroke="#6B1A06" stroke-width="0.6" opacity="0.25"/>
  <line x1="1300" y1="500" x2="920"  y2="340" stroke="#6B1A06" stroke-width="0.7" opacity="0.28"/>

  <!-- ══ STARS — warm peach/amber, not white ══ -->
  <!-- Using filter for soft glow -->
  <g filter="url(#starGlow)" fill="#F5C090" opacity="0.70">
    <circle cx="120"  cy="55"  r="2.5"/>
    <circle cx="310"  cy="38"  r="2.0"/>
    <circle cx="540"  cy="72"  r="2.2"/>
    <circle cx="680"  cy="28"  r="1.8"/>
    <circle cx="750"  cy="55"  r="1.5"/>
    <circle cx="830"  cy="42"  r="1.6"/>
    <circle cx="1050" cy="35"  r="2.0"/>
    <circle cx="1140" cy="68"  r="1.7"/>
    <circle cx="1220" cy="44"  r="2.2"/>
    <circle cx="1310" cy="30"  r="1.5"/>
    <circle cx="200"  cy="115" r="2.8"/>
    <circle cx="420"  cy="130" r="2.2"/>
    <circle cx="620"  cy="105" r="2.5"/>
    <circle cx="790"  cy="95"  r="1.8"/>
    <circle cx="970"  cy="118" r="1.6"/>
    <circle cx="1080" cy="88"  r="2.0"/>
    <circle cx="1180" cy="105" r="2.3"/>
    <circle cx="75"   cy="175" r="2.0"/>
    <circle cx="280"  cy="200" r="2.5"/>
    <circle cx="460"  cy="185" r="1.8"/>
    <circle cx="185"  cy="260" r="2.2"/>
    <circle cx="380"  cy="275" r="1.6"/>
  </g>

  <!-- ══ GROUND ══ -->
  <rect x="0" y="520" width="1440" height="180" fill="url(#groundGrad)"/>
  <!-- Road centre block -->
  <rect x="560" y="480" width="180" height="220" fill="#3A1006"/>

  <!-- ══ BUILDINGS LEFT GROUP ══ -->
  <!-- Far back buildings — slightly lighter for depth -->
  <rect x="0"   y="430" width="55"  height="130" fill="#3E1208" rx="1"/>
  <rect x="60"  y="400" width="45"  height="160" fill="#421408" rx="1"/>
  <rect x="110" y="450" width="35"  height="110" fill="#3A1006" rx="1"/>
  <rect x="150" y="420" width="55"  height="140" fill="#461608" rx="1"/>
  <rect x="210" y="460" width="40"  height="100" fill="#3A1006" rx="1"/>
  <rect x="255" y="410" width="65"  height="150" fill="#4A1808" rx="1"/>
  <rect x="325" y="445" width="35"  height="115" fill="#3E1208" rx="1"/>
  <rect x="365" y="390" width="80"  height="170" fill="#521A0A" rx="1"/>

  <!-- Building windows LEFT — warm amber glow -->
  <g filter="url(#winGlow)" fill="#E8803A" opacity="0.65">
    <rect x="68"  y="420" width="10" height="8"/>
    <rect x="82"  y="420" width="10" height="8"/>
    <rect x="68"  y="434" width="10" height="8"/>
    <rect x="158" y="440" width="12" height="9"/>
    <rect x="174" y="440" width="12" height="9"/>
    <rect x="158" y="455" width="12" height="9"/>
    <rect x="266" y="430" width="14" height="10"/>
    <rect x="284" y="430" width="14" height="10"/>
    <rect x="266" y="445" width="14" height="10"/>
    <rect x="284" y="445" width="14" height="10"/>
    <rect x="375" y="408" width="16" height="11"/>
    <rect x="396" y="408" width="16" height="11"/>
    <rect x="375" y="424" width="16" height="11"/>
    <rect x="396" y="424" width="16" height="11"/>
    <rect x="375" y="440" width="16" height="11"/>
  </g>

  <!-- ══ BUILDINGS RIGHT GROUP ══ -->
  <rect x="760"  y="445" width="40"  height="115" fill="#3E1208" rx="1"/>
  <rect x="805"  y="415" width="55"  height="145" fill="#461608" rx="1"/>
  <rect x="865"  y="460" width="35"  height="100" fill="#3A1006" rx="1"/>
  <rect x="905"  y="395" width="70"  height="165" fill="#521A0A" rx="1"/>
  <rect x="980"  y="430" width="50"  height="130" fill="#421408" rx="1"/>
  <rect x="1035" y="400" width="60"  height="160" fill="#4A1808" rx="1"/>
  <rect x="1100" y="420" width="45"  height="140" fill="#3E1208" rx="1"/>
  <rect x="1150" y="385" width="80"  height="175" fill="#561C0A" rx="1"/>
  <rect x="1235" y="440" width="50"  height="120" fill="#421408" rx="1"/>
  <rect x="1290" y="410" width="60"  height="150" fill="#4A1808" rx="1"/>
  <rect x="1355" y="430" width="85"  height="130" fill="#3E1208" rx="1"/>

  <!-- Building windows RIGHT — warm amber glow -->
  <g filter="url(#winGlow)" fill="#E8803A" opacity="0.65">
    <rect x="812"  y="432" width="12" height="9"/>
    <rect x="828"  y="432" width="12" height="9"/>
    <rect x="812"  y="447" width="12" height="9"/>
    <rect x="912"  y="412" width="16" height="11"/>
    <rect x="932"  y="412" width="16" height="11"/>
    <rect x="912"  y="428" width="16" height="11"/>
    <rect x="932"  y="428" width="16" height="11"/>
    <rect x="912"  y="444" width="16" height="11"/>
    <rect x="1042" y="418" width="14" height="10"/>
    <rect x="1060" y="418" width="14" height="10"/>
    <rect x="1042" y="433" width="14" height="10"/>
    <rect x="1158" y="402" width="18" height="12"/>
    <rect x="1180" y="402" width="18" height="12"/>
    <rect x="1158" y="420" width="18" height="12"/>
    <rect x="1180" y="420" width="18" height="12"/>
    <rect x="1158" y="438" width="18" height="12"/>
    <rect x="1297" y="426" width="14" height="10"/>
    <rect x="1315" y="426" width="14" height="10"/>
    <rect x="1297" y="441" width="14" height="10"/>
  </g>

  <!-- ══ FOREGROUND STREET ══ -->
  <rect x="0" y="600" width="1440" height="100" fill="#250A03"/>
  <!-- Street warm highlight line -->
  <line x1="0" y1="602" x2="1440" y2="602" stroke="#C04830" stroke-width="1.5" opacity="0.20"/>

  <!-- ══ VIGNETTE (final pass — keeps it premium, not black) ══ -->
  <rect width="1440" height="700" fill="url(#vignette)"/>

</svg>
